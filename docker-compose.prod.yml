# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  api:
    environment:
      PRODUCTION: "true"
      LIVE_SIMULATOR_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS to your public URL}
      MITIGATION_AUTO_ENABLED: ${MITIGATION_AUTO_ENABLED:-true}
      MITIGATION_MODE: ${MITIGATION_MODE:-simulated}
    command:
      [
        "uvicorn", "app.main:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--app-dir", "/app/backend",
        "--workers", "${UVICORN_WORKERS:-1}",
        "--timeout-keep-alive", "120",
        "--proxy-headers",
        "--forwarded-allow-ips", "*",
      ]
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL to your public origin}
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
