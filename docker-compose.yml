name: halal-graph

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-halal-graph-docker-secret}
      REDIS_URL: redis://redis:6379/0
      MITIGATION_AUTO_ENABLED: ${MITIGATION_AUTO_ENABLED:-true}
      MITIGATION_MODE: ${MITIGATION_MODE:-simulated}
      MITIGATION_WEBHOOK_URL: ${MITIGATION_WEBHOOK_URL:-}
      MITIGATION_FILTER_BLOCKED_FLOWS: ${MITIGATION_FILTER_BLOCKED_FLOWS:-true}
      LIVE_SIMULATOR_ENABLED: ${LIVE_SIMULATOR_ENABLED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
