# Render Blueprint — Halal Graph API (FastAPI + GNN)
# https://render.com/docs/blueprint-spec
#
# PyTorch needs more than 512MB RAM. Use Standard (2GB) for reliable demo traffic.
# Free/Starter (512MB) may still OOM; set LIVE_SIMULATOR_ENABLED=false if needed.

services:
  - type: web
    name: halal-graph-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir /app/backend --workers 1
    plan: standard
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PRODUCTION
        value: "true"
      - key: LIVE_SIMULATOR_ENABLED
        value: "true"
      - key: LIVE_SIMULATOR_SAMPLE_ROWS
        value: "5000"
      - key: LIVE_SIMULATOR_INTERVAL_SECONDS
        value: "3"
      - key: LIVE_SIMULATOR_TICKS_PER_INTERVAL
        value: "2"
      - key: LIVE_SIMULATOR_ATTACKS_PER_10
        value: "4"
      - key: LOAD_GCN
        value: "true"
      - key: LOAD_GAT
        value: "false"
      - key: LOAD_RF
        value: "false"
      - key: MITIGATION_AUTO_ENABLED
        value: "true"
      - key: MITIGATION_MODE
        value: simulated
      - key: MITIGATION_FILTER_BLOCKED_FLOWS
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHONPATH
        value: /app/src:/app/backend
      - key: OMP_NUM_THREADS
        value: "1"
